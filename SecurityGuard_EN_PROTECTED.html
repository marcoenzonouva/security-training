<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Ontario Security Guard Training</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;
  background:linear-gradient(135deg,#0F2645 0%,#1A4A8A 60%,#0F2645 100%);
  display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:white;border-radius:20px;padding:36px 32px 30px;
  max-width:440px;width:100%;box-shadow:0 24px 80px rgba(0,0,0,.45);text-align:center;}
.logo img{width:130px;border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,.15);margin-bottom:18px;}
.card h1{font-size:1.08rem;font-weight:800;color:#0F2645;margin-bottom:3px;}
.card .sub{font-size:.78rem;color:#6B7280;margin-bottom:16px;line-height:1.5;}
.badge{display:inline-block;padding:3px 14px;border-radius:20px;
  font-size:.72rem;font-weight:700;margin-bottom:16px;}
.badge-fr{background:#1A4A8A;color:white;}
.badge-en{background:#C8960A;color:#0F2645;}
.field{margin-bottom:12px;text-align:left;}
.field label{display:block;font-size:.72rem;font-weight:700;color:#374151;
  margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;}
.field input{width:100%;padding:12px 15px;border:2px solid #E5E7EB;
  border-radius:10px;font-size:.92rem;color:#111827;outline:none;
  transition:border .18s;background:#F9FAFB;}
.field input:focus{border-color:#1A4A8A;background:white;
  box-shadow:0 0 0 3px rgba(26,74,138,.1);}
.pw-wrap{position:relative;}
.pw-wrap input{padding-right:42px;}
.eye{position:absolute;right:11px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:#9CA3AF;font-size:1rem;}
.btn{width:100%;padding:13px;
  background:linear-gradient(135deg,#0F2645,#1A4A8A);
  color:white;border:none;border-radius:10px;font-size:.95rem;font-weight:700;
  cursor:pointer;transition:all .2s;margin-top:4px;}
.btn:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 6px 20px rgba(15,38,69,.3);}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.msg{display:none;padding:10px 13px;border-radius:8px;font-size:.8rem;
  margin-bottom:11px;text-align:left;}
.msg.show{display:block;}
.err{background:#FEE2E2;color:#B91C1C;border-left:4px solid #B91C1C;}
.lock{background:#FEF3C7;color:#92400E;border-left:4px solid #D97706;}
.ok{background:#D4F0DE;color:#14532D;border-left:4px solid #1A7A3C;}
.divider{border:none;border-top:1px solid #F0F2F6;margin:16px 0 14px;}
.sup{background:linear-gradient(135deg,#0F2645,#1A4A8A);
  border-radius:12px;padding:16px 18px;text-align:left;color:white;}
.sup-title{font-size:.72rem;font-weight:800;letter-spacing:.8px;
  text-transform:uppercase;color:#FCD34D;margin-bottom:10px;
  display:flex;align-items:center;gap:6px;}
.sup-admin{display:flex;align-items:center;gap:10px;margin-bottom:11px;}
.sup-av{width:38px;height:38px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,#C8960A,#F59E0B);
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:.95rem;color:#0F2645;}
.sup-nm{font-weight:700;font-size:.87rem;}
.sup-rl{font-size:.71rem;color:rgba(255,255,255,.65);margin-top:1px;}
.sup-btns{display:flex;flex-direction:column;gap:7px;}
.sup-btn{display:flex;align-items:center;gap:8px;padding:8px 12px;
  border-radius:8px;text-decoration:none;font-size:.81rem;font-weight:600;
  transition:all .18s;}
.wa{background:#25D366;color:white;}
.wa:hover{background:#1ebe5a;}
.em{background:rgba(255,255,255,.12);color:white;border:1px solid rgba(255,255,255,.2);}
.em:hover{background:rgba(255,255,255,.2);}
.avail{display:inline-flex;align-items:center;gap:5px;
  font-size:.68rem;color:#6EE7B7;font-weight:600;margin-top:8px;}
.dot{width:7px;height:7px;border-radius:50%;background:#10B981;
  box-shadow:0 0 0 2px rgba(16,185,129,.3);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 2px rgba(16,185,129,.3);}
  50%{box-shadow:0 0 0 5px rgba(16,185,129,.1);}}
.copy{margin-top:13px;font-size:.66rem;color:#9CA3AF;}
#spinner{display:none;margin:10px auto;width:28px;height:28px;
  border:3px solid #E5E7EB;border-top-color:#1A4A8A;
  border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>

const LANG = 'EN';
let attempts = 0;

async function b64ToBytes(b64) {{
  const bin = atob(b64);
  return Uint8Array.from(bin, c => c.charCodeAt(0));
}}

async function deriveKey(password, salt) {{
  const enc = new TextEncoder();
  const keyMat = await crypto.subtle.importKey(
    'raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']
  );
  return crypto.subtle.deriveKey(
    {{name:'PBKDF2', salt, iterations:10000, hash:'SHA-256'}},
    keyMat,
    {{name:'AES-GCM', length:256}},
    false, ['decrypt']
  );
}}

async function aesDecrypt(key, ivB64, ctB64, tagB64) {{
  const iv  = await b64ToBytes(ivB64);
  const ct  = await b64ToBytes(ctB64);
  const tag = await b64ToBytes(tagB64);
  // In AES-GCM the tag is appended to ciphertext
  const ctWithTag = new Uint8Array(ct.length + tag.length);
  ctWithTag.set(ct); ctWithTag.set(tag, ct.length);
  return crypto.subtle.decrypt({{name:'AES-GCM', iv}}, key, ctWithTag);
}}

async function doLogin() {{
  const username = document.getElementById('un').value.trim().toUpperCase();
  const password = document.getElementById('pw').value;
  const btn = document.getElementById('loginBtn');
  const spin = document.getElementById('spinner');

  hideMessages();
  if (!username || !password) {{
    showMsg('err', LANG==='FR'
      ? 'Veuillez remplir tous les champs.'
      : 'Please fill in all fields.');
    return;
  }}

  const userEntry = ENC.users[username];
  if (!userEntry) {{
    attempts++;
    checkAttempts();
    showMsg('err', LANG==='FR'
      ? 'Identifiants incorrects. (' + attempts + '/5 tentatives)'
      : 'Incorrect credentials. (' + attempts + '/5 attempts)');
    return;
  }}

  btn.disabled = true;
  spin.style.display = 'block';
  showMsg('ok', LANG==='FR' ? '🔓 Déchiffrement en cours...' : '🔓 Decrypting content...');

  try {{
    const salt    = await b64ToBytes(ENC.salt);
    const userKey = await deriveKey(password, salt);
    const [k_iv, k_ct, k_tag] = userEntry.split(':');
    let masterKeyBytes;
    try {{
      masterKeyBytes = await aesDecrypt(userKey, k_iv, k_ct, k_tag);
    }} catch(e) {{
      attempts++;
      checkAttempts();
      spin.style.display = 'none';
      btn.disabled = false;
      showMsg('err', LANG==='FR'
        ? 'Mot de passe incorrect. (' + attempts + '/5 tentatives)'
        : 'Incorrect password. (' + attempts + '/5 attempts)');
      return;
    }}

    // Decrypt content
    const masterKey = await crypto.subtle.importKey(
      'raw', masterKeyBytes, {{name:'AES-GCM'}}, false, ['decrypt']
    );
    const {{iv, ct, tag}} = ENC.content;
    const compressedBytes = await aesDecrypt(masterKey, iv, ct, tag);

    // Decompress (gzip → DecompressionStream)
    const ds = new DecompressionStream('gzip');
    const writer = ds.writable.getWriter();
    writer.write(new Uint8Array(compressedBytes));
    writer.close();
    const decompressed = await new Response(ds.readable).arrayBuffer();
    const html = new TextDecoder().decode(decompressed);

    // Inject app
    document.getElementById('loginPage').style.display = 'none';
    document.open(); document.write(html); document.close();

  }} catch(e) {{
    spin.style.display = 'none';
    btn.disabled = false;
    showMsg('err', LANG==='FR'
      ? 'Erreur de déchiffrement. Contactez le support.'
      : 'Decryption error. Please contact support.');
    console.error(e);
  }}
}}

function checkAttempts() {{
  if (attempts >= 5) {{
    document.getElementById('loginBtn').disabled = true;
    showMsg('lock', LANG==='FR'
      ? '🔒 Trop de tentatives. Rechargez la page ou contactez le support : 613-867-9988'
      : '🔒 Too many attempts. Reload the page or contact support: 613-867-9988');
  }}
}}

function hideMessages() {{
  document.querySelectorAll('.msg').forEach(m => m.className = 'msg');
}}

function showMsg(type, text) {{
  const el = document.getElementById(type + 'Msg');
  if (el) {{ el.textContent = text; el.className = 'msg ' + type + ' show'; }}
}}

function togglePw() {{
  const inp = document.getElementById('pw');
  const btn = document.getElementById('eyeBtn');
  if (inp.type === 'password') {{ inp.type = 'text'; btn.textContent = '🙈'; }}
  else {{ inp.type = 'password'; btn.textContent = '👁'; }}
}}

document.addEventListener('keydown', e => {{ if (e.key === 'Enter') doLogin(); }});
</script>
